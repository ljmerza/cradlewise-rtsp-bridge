# mediamtx config for the Cradlewise RTSP bridge.
# The bridge publishes the crib feed to the path named by RTSP_URL (default
# `cradlewise`). The `all_others` catch-all below accepts whatever path RTSP_URL
# points at, so the served path name is driven entirely by that env var — point
# your NVR at rtsp://<host>:8554/<that path>. Default RTSP listener is :8554.
logLevel: info

# Force RTSP-over-TCP. Behind Docker NAT, UDP RTP/RTCP (8000/8001) doesn't reach
# remote clients, so TCP-interleaved media on the single 8554 connection is what
# lets remote viewers (VLC) and NVRs pull reliably.
protocols: [tcp]

paths:
  cradlewise:
    # Anchor path: runOnInit fires at startup ONLY for explicitly-named paths,
    # so this is what launches the single 24/7 bridge publisher. The bridge then
    # publishes to RTSP_URL (which may be a different path name) — `all_others`
    # accepts that. mediamtx restarts the publisher if it exits; the bridge also
    # self-supervises/reconnects internally.
    runOnInit: python3 -u /app/bridge.py
    runOnInitRestart: yes
  # Accept publish/read on any path not named above (e.g. the deployment's
  # `cradlewise_aubrey`), so the path name follows RTSP_URL without a rebuild.
  all_others:
